<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match History</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px 14px; border: 1px solid #333; text-align: left; }
        th { background: #f5f5f5; font-weight: bold; }
        a { color: #1565c0; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .back { font-size: 14px; border: 2px solid #333; padding: 4px 12px; color: #333; }
    </style>
</head>
<body>

<header class="header">
    <h1>PICKLEBALL POINT COUNTING SYSTEM</h1>
</header>

<div style="padding: 10px 20px;">
    <a href="/" class="back">← Dashboard</a>
    <h2 style="margin: 15px 0; font-size: 20px; font-weight: bold;">Match History</h2>
    <table>
        <thead>
            <tr>
                <th>Match</th>
                <th>Started</th>
                <th>Duration</th>
                <th>Analysis</th>
            </tr>
        </thead>
        <tbody>
            <!-- Using jinja2 templating -->
            {% for m in matches %}
            <tr>
                <td>#{{ m.id }}</td>
                <td>{{ m.started_at[:19] }}</td>
                <td>{{ m.duration }}</td>
                <td><a href="/analysis/{{ m.id }}">View Analysis</a></td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" style="text-align: center; color: #999;">No matches recorded yet.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
