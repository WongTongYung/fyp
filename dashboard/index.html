<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pickleball Point Counting System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header -->
    <header class="header">
        <h1>PICKLEBALL POINT COUNTING SYSTEM</h1>
        <span id="clock" class="clock"></span>
    </header>

    <!-- Main Layout: 4 containers in a grid -->
    <div class="grid-container">

        <!-- Top Left: Video Feed -->
        <div class="container video-section">
            <span id="status" class="status">(Status: Idle)</span>
            <div class="video-feed" id="videoFeed">
                <img src="/video_feed" alt="Live Feed" style="width:100%; height:100%; object-fit:contain;">
            </div>
        </div>

        <!-- Top Right: Scoreboard -->
        <div class="container scoreboard">
            <h3>Scoreboard</h3>
            <div class="score-card">
                <span class="score-label">Serving Team</span>
                <span class="score-value" id="servingScore">00</span>
            </div>
            <div class="server-indicator">
                Server #<span id="serverNumber">1</span>
            </div>
            <div class="score-card">
                <span class="score-label">Receiving</span>
                <span class="score-value" id="receivingScore">00</span>
            </div>
        </div>

        <!-- Bottom Left: Log -->
        <div class="container log-section">
            <h3>Log</h3>
            <div class="log-box" id="logBox"></div>
        </div>

        <!-- Bottom Right: Controls -->
        <div class="container controls">
            <h3>Controls</h3>
            <div class="control-buttons">
                <button id="startBtn" class="btn btn-start">Start</button>
                <button id="stopBtn" class="btn btn-stop">Stop</button>
            </div>
            <div class="control-buttons">
                <button id="rewindBtn" class="btn btn-rewind">Rewind</button>
            </div>
        </div>

    </div>

    <script src="js/main.js"></script>
</body>
</html>
