<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pickleball Point Counting System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header -->
    <header class="header">
        <h1>PICKLEBALL POINT COUNTING SYSTEM</h1>
        <span id="clock" class="clock"></span>
    </header>

    <!-- Main Layout: 4 containers in a grid -->
    <div class="grid-container">

        <!-- Top Left: Video Feed + Court View side by side -->
        <div class="container video-section">
            <span id="status" class="status">(Status: Idle)</span>
            <div class="video-court-row">
                <div class="video-feed" id="videoFeed">
                    <img id="liveFeed" src="/video_feed" alt="Live Feed">
                    <canvas id="overlayCanvas"></canvas>
                    <video id="rewindFeed" src="/styles/raw_video_output.mp4" controls style="display:none; width:100%; height:100%; object-fit:contain;"></video>
                </div>
                <div class="court-view-panel">
                    <canvas id="courtViewCanvas"></canvas>
                </div>
            </div>
        </div>

        <!-- Top Right: Scoreboard -->
        <div class="container scoreboard">
            <h3>Scoreboard</h3>
            <div class="score-card">
                <span class="score-label" id="servingLabel">Team A</span>
                <span class="score-value" id="servingScore">00</span>
            </div>
            <div class="server-indicator">
                Server #<span id="serverNumber">1</span>
                &nbsp;|&nbsp; Side: <span id="serverSide">near</span>
            </div>
            <div class="score-card">
                <span class="score-label" id="receivingLabel">Team B</span>
                <span class="score-value" id="receivingScore">00</span>
            </div>
        </div>

        <!-- Bottom Left: Log -->
        <div class="container log-section">
            <h3>Log</h3>
            <div class="log-box" id="logBox"></div>
        </div>

        <!-- Bottom Right: Controls -->
        <div class="container controls">
            <h3>Controls</h3>
            <div class="source-input">
                <label for="sourceInput">Source:</label>
                <input type="text" id="sourceInput" value="styles/FixedCamera.mp4" placeholder="video path or 0 for webcam">
            </div>
            <div class="setup-row">
                <label>Mode:</label>
                <button class="btn btn-toggle" data-mode="singles">Singles</button>
                <button class="btn btn-toggle active" data-mode="doubles">Doubles</button>
            </div>
            <div class="setup-row">
                <label>Serving Side:</label>
                <button class="btn btn-toggle active" data-side="near">Near</button>
                <button class="btn btn-toggle" data-side="far">Far</button>
            </div>
            <div class="setup-row" id="serverNumRow">
                <label>Server #:</label>
                <button class="btn btn-toggle active" data-srv="1">1</button>
                <button class="btn btn-toggle" data-srv="2">2</button>
            </div>
            <div class="setup-row">
                <label>Near Team:</label>
                <input type="text" id="teamNear" value="Team A" class="setup-input">
            </div>
            <div class="setup-row">
                <label>Far Team:</label>
                <input type="text" id="teamFar" value="Team B" class="setup-input">
            </div>
            <div class="setup-row">
                <label>Start Score:</label>
                <input type="number" id="startServing" value="0" min="0" class="setup-input-sm">
                <span>-</span>
                <input type="number" id="startReceiving" value="0" min="0" class="setup-input-sm">
            </div>
            <div class="control-buttons">
                <button id="startBtn" class="btn btn-start">Start</button>
                <button id="stopBtn" class="btn btn-stop">Stop</button>
            </div>
            <div class="control-buttons">
                <button id="rewindBtn" class="btn btn-rewind">Rewind</button>
            </div>
            <div class="control-buttons">
                <a href="/matches" style="text-decoration:none;">
                    <button class="btn" type="button">Match History</button>
                </a>
            </div>
        </div>

    </div>

    <script src="js/main.js"></script>
</body>
</html>
