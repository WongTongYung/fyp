<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Analysis — Pickleball</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/analysis.css">
    <script src="/js/chart.umd.min.js"></script>
    <meta name="match-id" content="{{ match_id }}">
</head>
<body>

<header class="header">
    <h1>PICKLEBALL POINT COUNTING SYSTEM</h1>
    <span id="clock" class="clock"></span>
</header>

<div class="nav-bar">
        <a href="/" class="nav-link">← Dashboard</a>
        <a href="/matches" class="nav-link">All Matches</a>
        <span class="match-title">Match Analysis &nbsp;#<span id="matchId"></span></span>
        <span id="matchDate" style="font-size:13px;color:#666;margin-left:auto;"></span>
    </div>

    <!-- Stats Summary -->
    <div class="stat-row">
        <div class="stat-card">
            <span class="stat-value" id="statDuration">—</span>
            <span class="stat-label">Duration</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="statPoints">—</span>
            <span class="stat-label">Total Points</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="statBounces">—</span>
            <span class="stat-label">Bounces Tracked</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="statSideOuts">—</span>
            <span class="stat-label">Side Outs</span>
        </div>
    </div>

    <!-- Bounce Map + Score Chart -->
    <div class="main-grid">

        <div class="panel">
            <h3>Bounce Map</h3>
            <canvas id="courtCanvas" height="320"></canvas>
            <div class="legend">
                <span><span class="dot" style="background:#66bb6a;border:1px solid #999;"></span> IN</span>
                <span><span class="dot" style="background:#ef5350;border:1px solid #999;"></span> OUT</span>
                <span><span class="dot" style="background:#42a5f5;border:1px solid #999;width:0;height:0;border-radius:0;border-left:5px solid transparent;border-right:5px solid transparent;border-bottom:10px solid #42a5f5;"></span> SERVE</span>
            </div>
        </div>

        <div class="panel">
            <h3>Score Timeline</h3>
            <div class="chart-wrap">
                <canvas id="scoreChart"></canvas>
            </div>
        </div>

    </div>

<script src="/js/analysis.js"></script>
</body>
</html>
